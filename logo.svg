<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Colophon mark: a printer's-device "C" in the Kanagawa Dragon palette.
       The copper fleuron in the mouth of the C is the end-of-book flourish a
       colophon historically is. Pure vector paths; depends on no font. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#282727"/>
      <stop offset="1" stop-color="#12120f"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#tile)"/>
  <path d="M 95 43 A 37 37 0 1 0 95 85" fill="none" stroke="#c8c093" stroke-width="16" stroke-linecap="round"/>
  <rect x="86" y="58" width="12" height="12" rx="2" transform="rotate(45 92 64)" fill="#b6927b"/>
</svg>
